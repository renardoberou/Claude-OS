          base64 -d /tmp/project.b64 > /tmp/project.zip
          unzip -o /tmp/project.zip -d /tmp/extract
          cp -rf /tmp/extract/ClaudeOS/* .
          cp -rf /tmp/extract/ClaudeOS/.gitignore . 2>/dev/null || true
          rm -rf /tmp/project.b64 /tmp/project.zip /tmp/extract
          echo "=== Project structure restored ==="
          find . -not -path './.git/*' -type f | sort

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeOS-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
